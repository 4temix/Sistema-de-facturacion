server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React routing
    location / {
        try_files $uri /index.html;
    }

    # Proxy a la API .NET
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}